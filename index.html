<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>IKARO — Fitness Tracker</title>
  <meta name="description" content="IKARO: allenamenti, nutrizione e progressi. Offline-first, i tuoi dati restano sul tuo dispositivo.">

  <!-- Tema PRIMA del primo paint: senza questo, l'app dipinge il tema di
       default e poi salta a quello scelto (flash a ogni avvio).
       Legge lo stesso storage dello store, ma in modo difensivo: qualsiasi
       errore ricade sul default e non blocca il boot. -->
  <script>
    (function () {
      var DEFAULT = 'hyper-crimson';
      var theme = DEFAULT;
      try {
        var raw = localStorage.getItem('ikaro-state-v2');
        if (raw) theme = JSON.parse(raw).profile.theme || DEFAULT;
      } catch (e) { /* storage assente o corrotto: resta il default */ }
      document.documentElement.dataset.theme = theme;
    })();
  </script>

  <!-- PWA -->
  <meta name="theme-color" content="#0A0A0B">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IKARO">

  <!-- Icone (i PNG arrivano in Fase 4: iOS ignora gli SVG per apple-touch-icon) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230A0A0B'/%3E%3Cpath d='M50 16 30 62h12l8-20 8 20h12L50 16Z' fill='%23FF4D1C'/%3E%3Ccircle cx='50' cy='76' r='7' fill='%23FF4D1C'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="/assets/icon-192.svg">

  <!-- Il font blocca il primo testo utile: va scaricato in parallelo al CSS -->
  <link rel="preload" href="/assets/fonts/Jost-var.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <!-- Fondo dietro la status bar iOS (serve solo ai temi chiari) -->
  <div class="statusbar-scrim" aria-hidden="true"></div>

  <!-- Copre il boot asincrono (apertura IndexedDB) -->
  <div id="splash" aria-hidden="true">
    <div class="wordmark">I<span class="k">K</span>ARO</div>
  </div>

  <!-- Contenitore delle viste (router SPA) -->
  <main id="app" aria-live="polite"></main>

  <noscript>
    <p style="padding:24px;text-align:center;">
      IKARO ha bisogno di JavaScript per funzionare. Abilitalo e ricarica la pagina.
    </p>
  </noscript>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
